name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install aiyo dependencies
        run: npm ci
        working-directory: aiyo

      - name: Build aiyo slides
        run: npm run build
        working-directory: aiyo

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp -r ai-agent-web-slides-template _site/ai-agent-web-slides-template
          cp -r aiyo/dist _site/aiyo
          cp _site/aiyo/index.html _site/aiyo/404.html
          echo '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>Slides</title></head><body><h1>Slides</h1><ul><li><a href="./ai-agent-web-slides-template/">AIエージェント活用講座</a></li><li><a href="./aiyo/">愛葉（aiyo-）</a></li></ul></body></html>' > _site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
